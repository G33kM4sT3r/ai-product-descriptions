<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Produkt-Viewer{{pageTitle}}</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="layout">
        <nav class="sidebar" role="navigation" aria-label="Produktnavigation">
            <div class="sidebar-header">
                <h2>Produkte</h2>
                <span class="badge">{{productCount}}</span>
            </div>
            <ul class="nav-list" role="list">
                {{navItems}}
            </ul>
        </nav>

        <main class="main" role="main">
            <div class="content">
                {{content}}
            </div>
        </main>
    </div>
</body>
</html>
